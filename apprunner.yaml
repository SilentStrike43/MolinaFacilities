version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m venv /app/venv
      - /app/venv/bin/pip install --no-cache-dir -r requirements.txt

run:
  runtime-version: "3.11"
  command: /app/venv/bin/gunicorn --bind=0.0.0.0:8000 --workers=2 --timeout=120 --log-level debug wsgi:application
  network:
    port: 8000
    env: PORT
  env:
    - name: PORT
      value: "8000"
    - name: FLASK_ENV
      value: production
