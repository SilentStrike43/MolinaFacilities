version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -r requirements.txt

run:
  runtime-version: "3.11"
  command: gunicorn --bind=0.0.0.0:8000 --workers=2 --timeout=120 wsgi:application
  network:
    port: 8000
    env: PORT
  env:
    - name: PORT
      value: "8000"
    - name: FLASK_ENV
      value: production
